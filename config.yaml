# config.yaml
model_name_or_path: ../bhl/Models/Qwen2.5-1.5B-Instruct
trust_remote_code: True

stage: sft
do_train: True
finetuning_type: lora
lora_target: all
lora_rank: 16
lora_alpha: 32

dataset: command_ds
dataset_dir: ./result_command
template: qwen
cutoff_len: 128
overwrite_cache: True
preprocessing_num_workers: 4
packing: True

output_dir: ./saves/qwen_command_lora
logging_steps: 5
save_steps: 100
plot_loss: True
overwrite_output_dir: True

per_device_train_batch_size: 8   # На 16ГБ точно влезет
gradient_accumulation_steps: 2
learning_rate: 2.0e-4
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: True
flash_attn: auto

val_size: 0.1
per_device_eval_batch_size: 4
eval_strategy: steps
eval_steps: 50
