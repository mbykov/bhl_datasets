# config_latex.yaml
model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
template: qwen
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.1

dataset: latex_ds
dataset_dir: generate_latex/results
cutoff_len: 512
val_size: 0.1

per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_steps: 100
bf16: true

# Экономия памяти
gradient_checkpointing: true

logging_steps: 10
save_steps: 500
eval_steps: 500
save_total_limit: 2
load_best_model_at_end: false

output_dir: saves/qwen_latex_lora
plot_loss: true
