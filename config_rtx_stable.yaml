# Конфиг для стабильного дообучения на RTX 5060 Ti
model_name_or_path: ../bhl/Models/Qwen2.5-1.5B-Instruct
trust_remote_code: True

stage: sft
do_train: True
finetuning_type: lora
lora_target: all
lora_rank: 8
lora_alpha: 16

dataset: merged_ds
dataset_dir: result_com_lat
template: qwen
cutoff_len: 128
overwrite_cache: True
preprocessing_num_workers: 1
packing: False

output_dir: ./saves/qwen_com_lat_lora
logging_steps: 10
save_steps: 50
save_total_limit: 2
plot_loss: True
overwrite_output_dir: True

# Критические настройки для стабильности
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1.5e-4
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.1

bf16: True
gradient_checkpointing: True
flash_attn: sdpa

# 4-bit квантование для снижения нагрузки
quantization_bit: 4
quantization_method: bitsandbytes

val_size: 0.05
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 50
